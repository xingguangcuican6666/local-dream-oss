name: Android CI

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust 1.84.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.84.0
          targets: aarch64-linux-android

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build native libraries (required for complete APK artifact)
        env:
          QNN_SDK_ROOT: ${{ vars.QNN_SDK_ROOT }}
          ANDROID_NDK_ROOT: ${{ vars.ANDROID_NDK_ROOT }}
        run: |
          if [ -z "${QNN_SDK_ROOT}" ] || [ ! -d "${QNN_SDK_ROOT}" ]; then
            echo "QNN_SDK_ROOT is not configured or does not exist."
            echo "Set repository variable QNN_SDK_ROOT to your extracted QNN SDK path."
            exit 1
          fi
          if [ -z "${ANDROID_NDK_ROOT}" ] || [ ! -d "${ANDROID_NDK_ROOT}" ]; then
            echo "ANDROID_NDK_ROOT is not configured or does not exist."
            echo "Set repository variable ANDROID_NDK_ROOT to your Android NDK path."
            exit 1
          fi

          python - <<'PY'
          import json
          from pathlib import Path
          import os

          cmakelists = Path("app/src/main/cpp/CMakeLists.txt")
          text = cmakelists.read_text(encoding="utf-8")
          qnn = os.environ["QNN_SDK_ROOT"]
          text = text.replace(
              "set(QNN_SDK_ROOT /data/qairt/2.39.0.250926)",
              f"set(QNN_SDK_ROOT {qnn})"
          )
          cmakelists.write_text(text, encoding="utf-8")

          presets = Path("app/src/main/cpp/CMakePresets.json")
          data = json.loads(presets.read_text(encoding="utf-8"))
          data["configurePresets"][0]["environment"]["ANDROID_NDK_ROOT"] = os.environ["ANDROID_NDK_ROOT"]
          presets.write_text(json.dumps(data, indent=2), encoding="utf-8")
          PY

          chmod +x gradlew app/src/main/cpp/build.sh
          cd app/src/main/cpp
          bash ./build.sh

      - name: Verify native runtime files
        run: |
          test -f app/src/main/jniLibs/arm64-v8a/libstable_diffusion_core.so
          test -f app/src/main/assets/qnnlibs/libQnnHtp.so
          test -f app/src/main/assets/qnnlibs/libQnnSystem.so

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Run unit tests
        run: ./gradlew testBasicDebugUnitTest --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/**/debug/*.apk
          if-no-files-found: warn
